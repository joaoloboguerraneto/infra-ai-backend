apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraform-ai-backend
  namespace: ai-infra
  labels:
    app: terraform-ai-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terraform-ai-backend
  template:
    metadata:
      labels:
        app: terraform-ai-backend
    spec:
      containers:
        - name: backend
          image: terraform-ai-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            # ── Ollama ──────────────────────────────────────────────
            - name: OLLAMA_URL
              value: "http://ollama.ai-infra.svc.cluster.local:11434"

            # ── Terraform State ─────────────────────────────────────
            - name: TF_STATE_BUCKET
              value: "unicred-terraform-state-poc"
            - name: AWS_REGION
              value: "us-east-1"

            # ── AWS Credentials (remova ao usar IRSA no EKS) ────────
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_DEFAULT_REGION

            # ── Azure DevOps ─────────────────────────────────────────
            - name: AZURE_DEVOPS_ORG
              value: "unicredbr"
            - name: AZURE_DEVOPS_PAT
              valueFrom:
                secretKeyRef:
                  name: azure-devops-credentials
                  key: AZURE_DEVOPS_PAT
                  optional: true

            # ── E-mail ───────────────────────────────────────────────
            # EMAIL_PROVIDER: "ses" (padrão) ou "smtp"
            - name: EMAIL_PROVIDER
              value: "smtp"
            - name: EMAIL_FROM
              value: "joaolgn1985@gmail.com"
            - name: SMTP_HOST
              value: "smtp.gmail.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: email-credentials
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: email-credentials
                  key: SMTP_PASS
                  optional: true

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: terraform-ai-backend
  namespace: ai-infra
  labels:
    app: terraform-ai-backend
spec:
  type: ClusterIP
  selector:
    app: terraform-ai-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080