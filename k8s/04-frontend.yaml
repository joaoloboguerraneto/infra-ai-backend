apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: ai-infra
  labels:
    app: terraform-ai-frontend
# Conteúdo gerado via:
#   kubectl create configmap frontend-html \
#     --from-file=index.html=frontend/index.html \
#     -n ai-infra --dry-run=client -o yaml | kubectl apply -f -
#
# O arquivo frontend/index.html está no repositório.
# Este ConfigMap é gerado no deploy — não edite manualmente aqui.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraform-ai-frontend
  namespace: ai-infra
  labels:
    app: terraform-ai-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terraform-ai-frontend
  template:
    metadata:
      labels:
        app: terraform-ai-frontend
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: html
          configMap:
            name: frontend-html

---
apiVersion: v1
kind: Service
metadata:
  name: terraform-ai-frontend
  namespace: ai-infra
  labels:
    app: terraform-ai-frontend
spec:
  type: ClusterIP
  selector:
    app: terraform-ai-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80